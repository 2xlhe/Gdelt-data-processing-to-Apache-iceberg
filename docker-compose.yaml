name: iceberg-mgc

services:
  broker:
    image: apache/kafka:latest
    container_name: kafka
    healthcheck:
      test: /opt/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server broker:9092 || exit 1
      interval: 5s
      timeout: 20s
      retries: 60
    ports:
      - "9092:9092"
    volumes:
      - ./data:/var/lib/kafka/data

  postgresql:
    hostname: postgres
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_PASSWORD: iceberg-postgres
    ports:
      - 5432:5432
